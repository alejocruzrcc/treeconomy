# Render Blueprint — Treeconomy (Free + Atlas producción)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: treeconomy
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "waitress-serve --port=$PORT treeproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.14"
      - key: DJANGO_SETTINGS_MODULE
        value: treeproject.settings.pro
      - key: SECRET_KEY
        generateValue: true
      - key: DB_NAME_PRO
        value: treeconomy_pro
      # Set these in the Render dashboard (do not commit secrets):
      # DB_HOST_PRO, DB_USER_PRO, DB_PASSWORD_PRO  → Atlas producción (cluster0)
      # ALLOWED_HOSTS, CSRF_TRUSTED_ORIGINS, DOMINIO, DOMINIO_URL
      # AWS_*, EMAIL_*, SOCIAL_*, STRIPE_*, CONVERTAPI_SECRET_KEY, MAPBOX_TOKEN
