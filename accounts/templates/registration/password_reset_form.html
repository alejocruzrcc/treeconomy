{% extends "base.html" %}

{% block title %}Reset your Password{% endblock %}

{% block content %}
<h1>¿Olvidaste tu contraseña?</h1>
<p>
    Ingrese su dirección de correo electrónico para obtener una nueva contraseña
</p>
<form method="post">
    {{ form.as_p }}
        <p><input type="submit" class="button-plant" value="Enviar"></p>
    {% csrf_token %}
</form>

{% endblock %}
